steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio-apps/crowd-tracking:$BUILD_ID
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio-apps/crowd-tracking:$BUILD_ID
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - crowd-tracking
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/portfolio-apps/crowd-tracking:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=4Gi
      - --cpu=2
      - --timeout=900
      - --concurrency=1
      - --min-instances=0
      - --max-instances=1
      - --set-env-vars=YOLO_MODEL=yolo11n.pt
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/portfolio-apps/crowd-tracking:$BUILD_ID
